<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="manifest" href="./manifest-tablet.json">
<meta name="theme-color" content="#16a34a">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>울림연기학원 등하원 체크 v63</title>
  <style>
    :root {
      --green: #16a34a;
      --green-dark: #166534;
      --green-soft: #ecfdf5;
      --blue: #2563eb;
      --red: #b91c1c;
      --red-soft: #fee2e2;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e5e7eb;
      --bg: #f8fafc;
      --dark: #0f172a;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }

    body {
      display: grid;
      grid-template-columns: minmax(520px, 1fr) minmax(520px, 1fr);
      min-height: 100vh;
    }

    .left {
      position: relative;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: #ffffff;
    }

    .right {
      position: relative;
      min-height: 100vh;
      background: #0b1220;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
    }

    .title {
      margin: 0;
      color: var(--green-dark);
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .clock {
      text-align: right;
      font-weight: 900;
      color: #111827;
      line-height: 1.25;
      white-space: nowrap;
    }

    .clock-date {
      font-size: 15px;
    }

    .clock-time {
      font-size: 24px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      padding: 24px;
    }

    .input-title {
      margin: 0 0 18px;
      text-align: center;
      color: var(--green-dark);
      font-size: 21px;
      font-weight: 900;
    }

    .pin-display {
      height: 62px;
      border: 2px solid #86efac;
      border-radius: 16px;
      background: #f0fdf4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 0.20em;
      color: #052e16;
      margin-bottom: 14px;
      user-select: none;
    }

    .pin-placeholder {
      color: #94a3b8;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 14px;
      font-family: inherit;
      font-weight: 900;
      cursor: pointer;
      transition: transform .06s ease, filter .12s ease, opacity .12s ease;
      user-select: none;
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .num-btn {
      height: 54px;
      background: #ffffff;
      color: #0f172a;
      font-size: 24px;
      box-shadow: 0 5px 14px rgba(15, 23, 42, 0.08);
      border: 1px solid #eef2f7;
    }

    .num-btn.utility-red {
      background: #fee2e2;
      color: #991b1b;
    }

    .num-btn.utility-gray {
      background: #f1f5f9;
      color: #334155;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .action-btn {
      height: 64px;
      color: #fff;
      font-size: 23px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.16);
    }

    .check-in {
      background: linear-gradient(180deg, #22c55e, #16a34a);
    }

    .check-out {
      background: linear-gradient(180deg, #3b82f6, #2563eb);
    }

    .status-card {
      flex: 1;
      min-height: 260px;
      border: 1px solid #86efac;
      background: #ecfdf5;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px;
      color: var(--green-dark);
    }

    .status-card.error {
      border-color: #fecaca;
      background: #fef2f2;
      color: #991b1b;
    }

    .status-card.warning {
      border-color: #fde68a;
      background: #fffbeb;
      color: #92400e;
    }

    .status-card h2 {
      margin: 0 0 12px;
      font-size: 25px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .status-card p {
      margin: 5px 0;
      font-size: 16px;
      color: #475569;
      line-height: 1.45;
    }

    .status-card .small {
      margin-top: 10px;
      font-size: 14px;
      color: #64748b;
    }

    .ad-wrap {
      width: min(74vw, 660px);
      max-width: 78%;
      text-align: center;
    }

    .ad-title {
      margin: 0 0 24px;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .ad-box {
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      background: #020617;
      box-shadow: 0 20px 50px rgba(0,0,0,.28);
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ad-box iframe,
    .ad-box video,
    .ad-box img {
      width: 100%;
      display: block;
      border: 0;
    }

    .ad-box img,
    .ad-box video {
      max-height: calc(100vh - 210px);
      object-fit: contain;
      background: #020617;
    }

    .ad-box iframe {
      aspect-ratio: 16 / 9;
      max-height: calc(100vh - 210px);
    }

    .ad-text {
      padding: 44px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .slide-count {
      position: absolute;
      left: 20px;
      bottom: 18px;
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 700;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, .52);
      z-index: 1000;
      padding: 24px;
    }

    .modal {
      width: min(620px, 92vw);
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 30px 90px rgba(15, 23, 42, .35);
      border: 2px solid #bbf7d0;
      padding: 38px 42px;
      text-align: center;
      animation: pop .12s ease-out;
    }

    .modal.error {
      border-color: #fecaca;
    }

    .modal.warning {
      border-color: #fde68a;
    }

    .modal h2 {
      margin: 0 0 16px;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--green-dark);
    }

    .modal.error h2 {
      color: #991b1b;
    }

    .modal.warning h2 {
      color: #92400e;
    }

    .modal p {
      margin: 7px 0;
      color: #475569;
      font-size: 17px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .modal-btn {
      min-width: 130px;
      padding: 14px 18px;
      font-size: 16px;
      background: #16a34a;
      color: #fff;
    }

    .modal-btn.gray {
      background: #475569;
    }

    .choice-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
      text-align: left;
    }

    .choice-btn {
      width: 100%;
      padding: 16px 18px;
      border-radius: 14px;
      background: #f8fafc;
      color: #111827;
      text-align: left;
      border: 1px solid #e5e7eb;
      font-size: 16px;
      line-height: 1.4;
    }

    .choice-btn b {
      color: #166534;
    }

    @keyframes pop {
      from { transform: scale(.98); opacity: .6; }
      to { transform: scale(1); opacity: 1; }
    }


    .ad-click-hint {
      position: absolute;
      right: 20px;
      top: 18px;
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 800;
      opacity: .75;
      background: rgba(255,255,255,.08);
      padding: 8px 12px;
      border-radius: 999px;
      pointer-events: none;
    }

    .ad-nav-row {
      position: absolute;
      right: 20px;
      bottom: 18px;
      display: flex;
      gap: 8px;
      z-index: 20;
    }

    .ad-nav-btn {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      border: 1px solid rgba(255,255,255,.14);
    }

    .ad-nav-btn:hover {
      background: rgba(255,255,255,.22);
    }

    @media (max-width: 1024px) {

  html,
  body {
    overflow-x: hidden;
    overflow-y: auto;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: auto;
    background: #eef2f7;
  }

  .left {
    width: 100%;
    max-width: 100%;
    min-height: auto;
  }

  .right {
    width: 100%;
    min-height: auto;
    padding: 20px 12px 80px;
    align-items: center;
    justify-content: flex-start;
  }

  .ad-wrap {
    width: 100%;
    max-width: 100%;
  }

  .ad-box {
    width: 100%;
    min-height: 200px;
  }

  .ad-box img,
  .ad-box video {
    width: 100%;
    height: auto;
    max-height: 70vh;
    object-fit: contain;
  }

  .ad-box iframe {
    width: 100%;
    aspect-ratio: 16 / 9;
  }
}

      .ad-box img,
      .ad-box video {
        width: 100%;
        height: auto;
        max-height: 70vh;
        object-fit: contain;
        background: #020617;
      }

      .ad-text {
        padding: 28px 22px;
        font-size: 15px;
      }

      .ad-click-hint {
        top: 12px;
        right: 14px;
        font-size: 11px;
        padding: 6px 9px;
      }

      .slide-count {
        left: 14px;
        bottom: 18px;
      }

      .ad-nav-row {
        right: 14px;
        bottom: 18px;
      }

      .ad-nav-btn {
        padding: 9px 12px;
        font-size: 12px;
      }

      .modal {
        padding: 30px 24px;
      }

      .modal h2 {
        font-size: 25px;
      }

      .modal p {
        font-size: 15px;
      }
    }

    @media (max-width: 480px) {
      .left {
        padding: 14px 12px 18px;
      }

      .title {
        font-size: 19px;
      }

      .clock-time {
        font-size: 18px;
      }

      .card {
        padding: 16px;
      }

      .keypad {
        gap: 8px;
      }

      .num-btn {
        height: 43px;
      }

      .right {
        padding: 20px 12px 64px;
      }

      .ad-title {
        font-size: 24px;
      }

      .ad-box img,
      .ad-box video {
        max-height: 68vh;
      }
    }
  </style>
</head>
<body>
  <section class="left">
    <div class="top-row">
      <h1 class="title">울림연기학원 등하원 체크</h1>
      <div class="clock">
        <div class="clock-date" id="clockDate">-</div>
        <div class="clock-time" id="clockTime">-</div>
      </div>
    </div>

    <div class="card">
      <h2 class="input-title">출결번호를 입력하세요</h2>
      <div class="pin-display" id="pinDisplay"><span class="pin-placeholder">출결번호</span></div>

      <div class="keypad">
        <button class="num-btn" onclick="pressNum('1')">1</button>
        <button class="num-btn" onclick="pressNum('2')">2</button>
        <button class="num-btn" onclick="pressNum('3')">3</button>
        <button class="num-btn" onclick="pressNum('4')">4</button>
        <button class="num-btn" onclick="pressNum('5')">5</button>
        <button class="num-btn" onclick="pressNum('6')">6</button>
        <button class="num-btn" onclick="pressNum('7')">7</button>
        <button class="num-btn" onclick="pressNum('8')">8</button>
        <button class="num-btn" onclick="pressNum('9')">9</button>
        <button class="num-btn utility-red" onclick="backspacePin()">지움</button>
        <button class="num-btn" onclick="pressNum('0')">0</button>
        <button class="num-btn utility-gray" onclick="clearPin()">전체삭제</button>
      </div>

      <div class="action-row">
        <button class="action-btn check-in" id="checkInBtn" onclick="submitCheck('in')">등원</button>
        <button class="action-btn check-out" id="checkOutBtn" onclick="submitCheck('out')">하원</button>
      </div>
    </div>

    <div class="status-card" id="statusCard">
      <div>
        <h2>출결번호를 입력해주세요.</h2>
        <p>등원 또는 하원 버튼을 누르면 출결이 기록됩니다.</p>
      </div>
    </div>
  </section>

  <section class="right" onclick="handleAdAreaClick(event)" title="클릭하면 다음 홍보자료로 넘어갑니다.">
    <div class="ad-wrap">
      <h2 class="ad-title" id="adTitle">홍보 영상</h2>
      <div class="ad-box" id="adBox">
        <div class="ad-text">홍보 자료를 불러오는 중입니다.</div>
      </div>
    </div>
    <div class="ad-click-hint">홍보 영역 클릭 시 다음</div>
    <div class="slide-count" id="slideCount">1 / 1</div>
    <div class="ad-nav-row">
      <button class="ad-nav-btn" onclick="event.stopPropagation(); prevAdSlide(true);">이전</button>
      <button class="ad-nav-btn" onclick="event.stopPropagation(); nextAdSlide(true);">다음</button>
    </div>
  </section>

  <div class="modal-backdrop" id="modalBackdrop" onclick="closeModalByBackdrop(event)">
    <div class="modal" id="modalBox">
      <h2 id="modalTitle">안내</h2>
      <p id="modalMessage"></p>
      <div class="modal-actions" id="modalActions">
        <button class="modal-btn" onclick="closeModal()">확인</button>
      </div>
    </div>
  </div>

  <script>
    /****************************************************
     * 설정
     * GAS 새 배포 URL을 새로 만들었다면 아래 API_URL만 바꾸면 됩니다.
     ****************************************************/
    const API_URL = "https://script.google.com/macros/s/AKfycbx7wQFuw6MqqOijmvuwpeiCWOk3xU3hr41xoKbRltQHLb1kLbr_1RD5Zzy3iuWcrhUD0A/exec";

    // Apps Script 속성 TABLET_KIOSK_KEY를 사용 중이면 주소에 ?kioskKey=값 을 붙이거나 여기에 직접 넣으세요.
    const URL_PARAMS = new URLSearchParams(location.search);
    const KIOSK_KEY = URL_PARAMS.get("kioskKey") || localStorage.getItem("ULIM_TABLET_KIOSK_KEY") || "";

    let pin = "";
    let busy = false;
    let lastMode = "in";
    let lastAttendanceNo = "";
    let selectedStudent = null;
    let adSlides = [];
    let adIndex = 0;
    let adTimer = null;

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function updateClock() {
      const now = new Date();
      const weekdays = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
      const ampm = now.getHours() >= 12 ? "오후" : "오전";
      const h12 = now.getHours() % 12 || 12;

      document.getElementById("clockDate").textContent =
        `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 ${weekdays[now.getDay()]}`;
      document.getElementById("clockTime").textContent =
        `${ampm} ${pad2(h12)}:${pad2(now.getMinutes())}`;
    }

    function pressNum(num) {
      if (busy) return;
      if (pin.length >= 8) return;
      pin += num;
      renderPin();
    }

    function backspacePin() {
      if (busy) return;
      pin = pin.slice(0, -1);
      renderPin();
    }

    function clearPin() {
      if (busy) return;
      pin = "";
      selectedStudent = null;
      renderPin();
    }

    function renderPin() {
      const el = document.getElementById("pinDisplay");
      if (!pin) {
        el.innerHTML = `<span class="pin-placeholder">출결번호</span>`;
      } else {
        el.textContent = pin;
      }
    }

    function setBusy(value) {
      busy = value;
      document.getElementById("checkInBtn").disabled = value;
      document.getElementById("checkOutBtn").disabled = value;
    }

    function apiUrl(params) {
      const q = new URLSearchParams(params);
      q.set("_", Date.now());
      if (KIOSK_KEY) q.set("kioskKey", KIOSK_KEY);
      return `${API_URL}?${q.toString()}`;
    }

    async function submitCheck(mode, extra = {}) {
      if (busy) return;

      const attendanceNo = extra.attendanceNo || pin;
      if (!attendanceNo) {
        showModal("출결번호를 입력해주세요.", "", "warning");
        return;
      }

      lastMode = mode;
      lastAttendanceNo = attendanceNo;
      setBusy(true);
      setStatus("처리 중입니다.", "잠시만 기다려주세요.", "warning");

      try {
        const params = {
          action: "tabletCheck",
          attendanceNo,
          mode
        };

        if (selectedStudent && selectedStudent.rowNumber) {
          params.selectedRowNumber = selectedStudent.rowNumber;
          params.selectedStudentName = selectedStudent.name || "";
        }

        Object.keys(extra || {}).forEach(key => {
          if (extra[key] !== undefined && extra[key] !== null) params[key] = extra[key];
        });

        const res = await fetch(apiUrl(params), { method: "GET", cache: "no-store" });
        const data = await res.json();

        // v60 핵심: 중복 등원/하원은 성공 화면을 띄우지 않고 안내 메시지만 표시합니다.
        // 이 경우 GAS에서 등하원기록, 출석부 자동표시, 알림톡 대기열 등록은 모두 차단됩니다.
        if (data && (data.duplicate === true || data.status === "duplicate" || data.status === "already")) {
          const modeText = data.mode || (mode === "out" ? "하원" : "등원");
          const duplicateMessage =
            data.message ||
            data.popupMessage ||
            (modeText === "하원" ? "이미 하원처리되었습니다." : "이미 등원처리되었습니다.");

          setStatus(duplicateMessage, "", "warning");
          showModal(duplicateMessage, "", "warning");
          clearPin();
          return;
        }

        if (data.status === "multiple") {
          showStudentChoice(data);
          return;
        }

        if (data.status === "multipleClasses") {
          showClassChoice(data);
          return;
        }

        if (data.status !== "success") {
          const msg = data.message || "처리에 실패했습니다.";
          setStatus("처리 실패", msg, "error");
          showModal("처리 실패", msg, "error");
          return;
        }

        renderSuccess(data);
        clearPin();

      } catch (err) {
        setStatus("처리 실패", err.message || String(err), "error");
        showModal("처리 실패", err.message || String(err), "error");
      } finally {
        setBusy(false);
      }
    }

    function renderSuccess(data) {
      const modeText = data.mode || "";
      const name = data.studentName || "학생";
      const className = data.className || "오늘 수업 확인 필요";
      const roomName = data.roomName || "데스크에 문의해주세요";
      const notify = data.notifyResult || "";

      const title = `${name}님이 ${modeText}하였습니다.`;
      const lines = [
        `오늘 수업: ${className}`,
        modeText === "등원" ? `오늘 강의실: ${roomName}` : `오늘 강의실: ${roomName}`,
        notify ? notify : ""
      ].filter(Boolean);

      setStatus(title, lines.join("\n"), "success");
      showModal(title, lines.slice(0, 2).join("\n"), "success");
    }

    function setStatus(title, message, type = "success") {
      const card = document.getElementById("statusCard");
      card.className = "status-card";
      if (type === "error") card.classList.add("error");
      if (type === "warning") card.classList.add("warning");

      const msg = message ? String(message).split("\n").map(v => `<p>${escapeHtml(v)}</p>`).join("") : "";
      card.innerHTML = `
        <div>
          <h2>${escapeHtml(title || "")}</h2>
          ${msg}
        </div>
      `;
    }

    function showStudentChoice(data) {
      const candidates = data.candidates || [];
      const title = "학생을 선택해주세요.";
      const message = `출결번호 ${data.attendanceNo || lastAttendanceNo}를 사용하는 학생이 여러 명입니다.`;

      const actions = candidates.map(student => {
        const label = `${student.name || ""} ${student.className ? " / " + student.className : ""}`;
        return `<button class="choice-btn" onclick='selectStudent(${JSON.stringify(student).replace(/'/g, "&#39;")})'>
          <b>${escapeHtml(student.name || "")}</b>
          <br>${escapeHtml(student.className || student.instructor || "")}
        </button>`;
      }).join("");

      showCustomModal(title, message, `<div class="choice-list">${actions}</div><div class="modal-actions"><button class="modal-btn gray" onclick="closeModal()">취소</button></div>`, "warning");
    }

    function selectStudent(student) {
      selectedStudent = student;
      closeModal();
      submitCheck(lastMode, { attendanceNo: lastAttendanceNo, selectedRowNumber: student.rowNumber, selectedStudentName: student.name });
    }

    function showClassChoice(data) {
      const classes = data.classes || [];
      const title = "수업을 선택해주세요.";
      const message = `${data.studentName || "학생"} 학생의 오늘 수업이 여러 개입니다.`;

      const actions = classes.map(cls => {
        const safe = JSON.stringify(cls).replace(/'/g, "&#39;");
        return `<button class="choice-btn" onclick='selectClass(${safe})'>
          <b>${escapeHtml(cls.className || "수업명 확인 필요")}</b>
          <br>강의실: ${escapeHtml(cls.roomName || "데스크에 문의해주세요")}
        </button>`;
      }).join("");

      showCustomModal(title, message, `<div class="choice-list">${actions}</div><div class="modal-actions"><button class="modal-btn gray" onclick="closeModal()">취소</button></div>`, "warning");
    }

    function selectClass(cls) {
      closeModal();
      submitCheck(lastMode, { attendanceNo: lastAttendanceNo, selectedClassIndex: cls.index });
    }

    function showModal(title, message = "", type = "success") {
      const actions = `<button class="modal-btn" onclick="closeModal()">확인</button>`;
      showCustomModal(title, message, `<div class="modal-actions">${actions}</div>`, type);

      // 정상/중복/오류 안내창은 일정 시간 뒤 자동 닫힘
      if (type !== "warning" || !document.querySelector(".choice-list")) {
        setTimeout(() => {
          const modal = document.getElementById("modalBackdrop");
          if (modal && modal.style.display === "flex") closeModal();
        }, type === "success" ? 1800 : 2400);
      }
    }

    function showCustomModal(title, message, innerHtml, type = "success") {
      const backdrop = document.getElementById("modalBackdrop");
      const box = document.getElementById("modalBox");
      box.className = "modal";
      if (type === "error") box.classList.add("error");
      if (type === "warning") box.classList.add("warning");

      document.getElementById("modalTitle").textContent = title || "안내";
      document.getElementById("modalMessage").textContent = message || "";
      document.getElementById("modalActions").innerHTML = innerHtml || `<button class="modal-btn" onclick="closeModal()">확인</button>`;
      backdrop.style.display = "flex";
    }

    function closeModal() {
      document.getElementById("modalBackdrop").style.display = "none";
    }

    function closeModalByBackdrop(event) {
      if (event.target && event.target.id === "modalBackdrop") closeModal();
    }

    async function loadAds() {
      try {
        const res = await fetch(apiUrl({ action: "tabletGetAds" }), { method: "GET", cache: "no-store" });
        const data = await res.json();
        adSlides = data.slides && data.slides.length ? data.slides : defaultSlides();
      } catch (err) {
        adSlides = defaultSlides();
      }
      adIndex = 0;
      renderAdSlide();
    }

    function defaultSlides() {
      return [
        {
          type: "공지",
          title: "홍보 영상",
          content: "울림연기학원에 오신 것을 환영합니다.",
          imageUrl: "",
          videoUrl: "",
          seconds: 8
        }
      ];
    }

    function renderAdSlide() {
      if (!adSlides.length) adSlides = defaultSlides();

      const slide = adSlides[adIndex] || adSlides[0];
      document.getElementById("adTitle").textContent = slide.title || "홍보 영상";
      document.getElementById("slideCount").textContent = `${adIndex + 1} / ${adSlides.length}`;

      const box = document.getElementById("adBox");
      const videoUrl = slide.videoUrl || "";
      const imageUrl = slide.imageUrl || "";

      if (videoUrl) {
        if (videoUrl.includes("youtube.com/embed/")) {
          box.innerHTML = `<iframe src="${escapeAttr(videoUrl)}?autoplay=1&mute=1&loop=1&playlist=${extractYoutubeId(videoUrl)}"
            allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
        } else {
          box.innerHTML = `<video src="${escapeAttr(videoUrl)}" autoplay muted loop playsinline></video>`;
        }
      } else if (imageUrl) {
        box.innerHTML = `<img src="${escapeAttr(imageUrl)}" alt="홍보 이미지" onerror="this.parentElement.innerHTML=\`<div class=\'ad-text\'>이미지를 불러오지 못했습니다.<br>이미지URL과 공유 권한을 확인해주세요.</div>\`;">`;
      } else {
        box.innerHTML = `<div class="ad-text">${escapeHtml(slide.content || "오늘도 좋은 수업 되세요.")}</div>`;
      }

      clearTimeout(adTimer);
      const seconds = Math.max(5, Number(slide.seconds || 10));
      adTimer = setTimeout(() => {
        nextAdSlide(false);
      }, seconds * 1000);
    }

    function nextAdSlide(manual = true) {
      if (!adSlides.length) return;
      clearTimeout(adTimer);
      adIndex = (adIndex + 1) % adSlides.length;
      renderAdSlide();
    }

    function prevAdSlide(manual = true) {
      if (!adSlides.length) return;
      clearTimeout(adTimer);
      adIndex = (adIndex - 1 + adSlides.length) % adSlides.length;
      renderAdSlide();
    }

    function handleAdAreaClick(event) {
      const tag = String((event.target && event.target.tagName) || "").toLowerCase();

      // 버튼 클릭은 각 버튼의 onclick에서 처리합니다.
      if (event.target && event.target.closest && event.target.closest("button")) return;

      // iframe/video/img 자체 클릭은 재생/제어를 방해하지 않도록 제외합니다.
      // 오른쪽 배경, 제목, 빈 영역을 누르면 다음 자료로 넘어갑니다.
      if (["iframe", "video", "img"].includes(tag)) return;

      nextAdSlide(true);
    }

    function extractYoutubeId(url) {
      const m = String(url || "").match(/embed\/([^?&/]+)/);
      return m ? m[1] : "";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    async function warmup() {
      try {
        await fetch(apiUrl({ action: "tabletWarmup" }), { method: "GET", cache: "no-store" });
      } catch (err) {}
    }

    updateClock();
    setInterval(updateClock, 1000);
    renderPin();
    loadAds();
    warmup();

    // 키보드 숫자 입력도 지원
    document.addEventListener("keydown", event => {
      if (/^\d$/.test(event.key)) pressNum(event.key);
      if (event.key === "Backspace") backspacePin();
      if (event.key === "Escape") {
        clearPin();
        closeModal();
      }
      if (event.key === "Enter") submitCheck("in");
      if (event.key === "ArrowRight") nextAdSlide(true);
      if (event.key === "ArrowLeft") prevAdSlide(true);
    });
  </script>
  <script>
let deferredPrompt = null;
const PWA_HIDE_KEY = "ULIM_TABLET_PWA_HIDE";
window.addEventListener("beforeinstallprompt", function (e) {

  if (localStorage.getItem(PWA_HIDE_KEY) === "Y") {
    return;
  }

  e.preventDefault();
  deferredPrompt = e;

  setTimeout(function () {
    showPwaInstallGuide();
  }, 600);
});

function showPwaInstallGuide() {
  if (!deferredPrompt) return;

  showCustomModal(
  "앱으로 설치하기",
  "울림연기학원 앱을 홈 화면에 설치하면 더 편하게 사용할 수 있습니다.",
  `
    <div class="modal-actions">
      <button class="modal-btn" onclick="installPwa()">앱 설치하기</button>
      <button class="modal-btn gray" onclick="closeModal()">나중에</button>
      <button class="modal-btn gray" onclick="hidePwaForever()">다시는 보지 않기</button>
    </div>
  `,
  "success"
);

async function installPwa() {
  if (!deferredPrompt) {
    closeModal();
    return;
  }

  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  closeModal();
}
  function hidePwaForever() {
  localStorage.setItem(PWA_HIDE_KEY, "Y");
  closeModal();
}
</script>

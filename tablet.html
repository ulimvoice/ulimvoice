<body>
  <section class="left">
    <div class="top-row">
      <h1 class="title">울림연기학원 등하원 체크</h1>
      <div class="clock">
        <div class="clock-date" id="clockDate">-</div>
        <div class="clock-time" id="clockTime">-</div>
      </div>
    </div>

    <div class="card">
      <h2 class="input-title">출결번호를 입력하세요</h2>
      <div class="pin-display" id="pinDisplay"><span class="pin-placeholder">출결번호</span></div>

      <div class="keypad">
        <button class="num-btn" onclick="pressNum('1')">1</button>
        <button class="num-btn" onclick="pressNum('2')">2</button>
        <button class="num-btn" onclick="pressNum('3')">3</button>
        <button class="num-btn" onclick="pressNum('4')">4</button>
        <button class="num-btn" onclick="pressNum('5')">5</button>
        <button class="num-btn" onclick="pressNum('6')">6</button>
        <button class="num-btn" onclick="pressNum('7')">7</button>
        <button class="num-btn" onclick="pressNum('8')">8</button>
        <button class="num-btn" onclick="pressNum('9')">9</button>
        <button class="num-btn utility-red" onclick="backspacePin()">지움</button>
        <button class="num-btn" onclick="pressNum('0')">0</button>
        <button class="num-btn utility-gray" onclick="clearPin()">전체삭제</button>
      </div>

      <div class="action-row">
        <button class="action-btn check-in" id="checkInBtn" onclick="submitCheck('in')">등원</button>
        <button class="action-btn check-out" id="checkOutBtn" onclick="submitCheck('out')">하원</button>
      </div>
    </div>

    <div class="status-card" id="statusCard">
      <div>
        <h2>출결번호를 입력해주세요.</h2>
        <p>등원 또는 하원 버튼을 누르면 출결이 기록됩니다.</p>
      </div>
    </div>
  </section>

  <section class="right" onclick="handleAdAreaClick(event)" title="클릭하면 다음 홍보자료로 넘어갑니다.">
    <div class="ad-wrap">
      <h2 class="ad-title" id="adTitle">홍보 영상</h2>
      <div class="ad-box" id="adBox">
        <div class="ad-text">홍보 자료를 불러오는 중입니다.</div>
      </div>
    </div>
    <div class="ad-click-hint">홍보 영역 클릭 시 다음</div>
    <div class="slide-count" id="slideCount">1 / 1</div>
    <div class="ad-nav-row">
      <button class="ad-nav-btn" onclick="event.stopPropagation(); prevAdSlide(true);">이전</button>
      <button class="ad-nav-btn" onclick="event.stopPropagation(); nextAdSlide(true);">다음</button>
    </div>
  </section>

  <div class="modal-backdrop" id="modalBackdrop" onclick="closeModalByBackdrop(event)">

      <h2 id="modalTitle">안내</h2>

      <div class="modal-actions" id="modalActions">
        <button class="modal-btn" onclick="closeModal()">확인</button>
      </div>

  <script>
    /****************************************************
     * 설정
     * GAS 새 배포 URL을 새로 만들었다면 아래 API_URL만 바꾸면 됩니다.
     ****************************************************/
    const API_URL = "https://script.google.com/macros/s/AKfycbx7wQFuw6MqqOijmvuwpeiCWOk3xU3hr41xoKbRltQHLb1kLbr_1RD5Zzy3iuWcrhUD0A/exec";

    // Apps Script 속성 TABLET_KIOSK_KEY를 사용 중이면 주소에 ?kioskKey=값 을 붙이거나 여기에 직접 넣으세요.
    const URL_PARAMS = new URLSearchParams(location.search);
    const KIOSK_KEY = URL_PARAMS.get("kioskKey") || localStorage.getItem("ULIM_TABLET_KIOSK_KEY") || "";

    let pin = "";
    let busy = false;
    let lastMode = "in";
    let lastAttendanceNo = "";
    let selectedStudent = null;
    let adSlides = [];
    let adIndex = 0;
    let adTimer = null;

    // v88 안정형 속도개선:
    // 학생/오늘수업 후보를 백그라운드로 미리 받아두고,
    // 다중 학생/다중 수업 선택은 태블릿 안에서 먼저 처리합니다.
    // 최종 등원/하원 기록 저장은 기존 GAS 처리 구조를 그대로 사용합니다.
    let tabletPreload = null;
    let tabletPreloadAt = 0;
    let tabletPreloadLoading = false;

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function updateClock() {
      const now = new Date();
      const weekdays = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
      const ampm = now.getHours() >= 12 ? "오후" : "오전";
      const h12 = now.getHours() % 12 || 12;

      document.getElementById("clockDate").textContent =
        `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 ${weekdays[now.getDay()]}`;
      document.getElementById("clockTime").textContent =
        `${ampm} ${pad2(h12)}:${pad2(now.getMinutes())}`;
    }

    function pressNum(num) {
      if (busy) return;
      if (pin.length >= 8) return;
      pin += num;
      renderPin();
    }

    function backspacePin() {
      if (busy) return;
      pin = pin.slice(0, -1);
      renderPin();
    }

    function clearPin() {
      if (busy) return;
      pin = "";
      selectedStudent = null;
      renderPin();
    }

    function renderPin() {
      const el = document.getElementById("pinDisplay");
      if (!pin) {
        el.innerHTML = `<span class="pin-placeholder">출결번호</span>`;
      } else {
        el.textContent = pin;
      }
    }
    function setBusy(value) {
      busy = value;
      document.getElementById("checkInBtn").disabled = value;
      document.getElementById("checkOutBtn").disabled = value;
    }

    function apiUrl(params) {
      const q = new URLSearchParams(params);
      q.set("_", Date.now());
      if (KIOSK_KEY) q.set("kioskKey", KIOSK_KEY);
      return `${API_URL}?${q.toString()}`;
    }

    async function submitCheck(mode, extra = {}) {
      if (busy) return;

      const attendanceNo = extra.attendanceNo || pin;
      if (!attendanceNo) {
        showModal("출결번호를 입력해주세요.", "", "warning");
        return;
      }

      // ✅ 실사용 속도 개선: 등원/하원 버튼을 누르는 즉시 입력값을 비웁니다.
      // GAS 응답을 기다리지 않으므로 다음 학생이 바로 입력할 수 있습니다.
      if (!extra.attendanceNo) {
        pin = "";
        selectedStudent = null;
        renderPin();
      }

      lastMode = mode;
      lastAttendanceNo = attendanceNo;

      if (tryHandleWithPreload(attendanceNo, mode, extra || {})) {
        return;
      }

      setBusy(true);
      setStatus("처리 중입니다.", "잠시만 기다려주세요.", "warning");

      try {
        const params = {
          action: "tabletCheck",
          attendanceNo,
          mode
        };

        if (selectedStudent && selectedStudent.rowNumber) {
          params.selectedRowNumber = selectedStudent.rowNumber;
          params.selectedStudentName = selectedStudent.name || "";
        }

        Object.keys(extra || {}).forEach(key => {
          if (extra[key] !== undefined && extra[key] !== null) params[key] = extra[key];
        });

        const res = await fetch(apiUrl(params), { method: "GET", cache: "no-store" });
        const data = await res.json();

        // v60 핵심: 중복 등원/하원은 성공 화면을 띄우지 않고 안내 메시지만 표시합니다.
        // 이 경우 GAS에서 등하원기록, 출석부 자동표시, 알림톡 대기열 등록은 모두 차단됩니다.
        if (data && (data.duplicate === true || data.status === "duplicate" || data.status === "already")) {
          const modeText = data.mode || (mode === "out" ? "하원" : "등원");
          const duplicateMessage =
            data.message ||
            data.popupMessage ||
            (modeText === "하원" ? "이미 하원처리되었습니다." : "이미 등원처리되었습니다.");

          setStatus(duplicateMessage, "", "warning");
          showModal(duplicateMessage, "", "warning");
          clearPin();
          return;
        }

        if (data.status === "multiple") {
          showStudentChoice(data);
          return;
        }

        if (data.status === "multipleClasses") {
          showClassChoice(data);
          return;
        }
        if (data.status !== "success") {
          const msg = data.message || "처리에 실패했습니다.";
          setStatus("처리 실패", msg, "error");
          showModal("처리 실패", msg, "error");
          return;
        }

        renderSuccess(data);
        clearPin();

      } catch (err) {
        setStatus("처리 실패", err.message || String(err), "error");
        showModal("처리 실패", err.message || String(err), "error");
      } finally {
        setBusy(false);
      }
    }

    function renderSuccess(data) {
      const modeText = data.mode || "";
      const name = data.studentName || "학생";
      const className = data.className || "오늘 수업 확인 필요";
      const roomName = data.roomName || "데스크문의";

      const title = `${name}님이 ${modeText}하였습니다.`;
      const lines = [
        `오늘 수업: ${className}`,
        `오늘 강의실: ${roomName}`
      ];

      setStatus(title, lines.join("\n"), "success");
      showModal(title, lines.join("\n"), "success");
    }

    function setStatus(title, message, type = "success") {
      const card = document.getElementById("statusCard");
      card.className = "status-card";
      if (type === "error") card.classList.add("error");
      if (type === "warning") card.classList.add("warning");

      const msg = message ? String(message).split("\n").map(v => `<p>${escapeHtml(v)}</p>`).join("") : "";
      card.innerHTML = `
        <div>
          <h2>${escapeHtml(title || "")}</h2>
          ${msg}
        </div>
      `;
    }

    function showStudentChoice(data) {
      const candidates = data.candidates || [];
      const title = "학생을 선택해주세요.";
      const message = `출결번호 ${data.attendanceNo || lastAttendanceNo}를 사용하는 학생이 여러 명입니다.`;

      window.__studentCandidates = candidates;

      const options = candidates.map((student, index) => {
        // 동일 출결번호 학생 선택 시에는 강사명/반명 없이 학생명만 표시합니다.
        const label = student.name || "이름 확인 필요";
        return `<option value="${index}">${escapeHtml(label)}</option>`;
      }).join("");

      const inner = `
        <div class="choice-select-wrap">
          <label class="choice-label" for="studentChoiceSelect">학생 선택</label>
          <select class="choice-select" id="studentChoiceSelect">${options}</select>
          <p class="choice-help">드롭바를 눌러 학생을 선택한 뒤 선택 버튼을 눌러주세요.</p>
        </div>
        <div class="modal-actions">
          <button class="modal-btn" onclick="confirmStudentChoice()">선택</button>
          <button class="modal-btn gray" onclick="cancelChoiceModal()">취소</button>
        </div>
      `;

      showCustomModal(title, message, inner, "warning", "select-modal");
      focusSelectSoon("studentChoiceSelect");
    }

    function confirmStudentChoice() {
      const select = document.getElementById("studentChoiceSelect");
      const index = select ? Number(select.value) : 0;
      const student = (window.__studentCandidates || [])[index];

      if (!student) {
        showModal("학생 선택 오류", "학생 정보를 다시 선택해주세요.", "error");
        return;
      }

      selectStudent(student);
    }

    function selectStudent(student) {
      selectedStudent = student;
      closeModal();

      const classes = Array.isArray(student.classes) ? student.classes : [];
      if (classes.length > 1) {
        showClassChoice({
          status: "multipleClasses",
          attendanceNo: lastAttendanceNo,
          studentName: student.name,
          classes: classes
        });
        return;
      }

      const selectedClassIndex = classes.length === 1 ? classes[0].index : undefined;
      submitCheck(lastMode, {
        attendanceNo: lastAttendanceNo,
        selectedRowNumber: student.rowNumber,
        selectedStudentName: student.name,
        selectedClassIndex: selectedClassIndex
      });
    }

    function showClassChoice(data) {
      const classes = data.classes || [];
      const title = "수업을 선택해주세요.";
      const message = `${data.studentName || "학생"} 학생의 오늘 수업이 여러 개입니다.`;

      window.__classCandidates = classes;

      const options = classes.map((cls, index) => {
        const label = [
          cls.className || "수업명 확인 필요",
          cls.roomName ? `강의실: ${cls.roomName}` : "강의실: 데스크문의"
        ].filter(Boolean).join(" / ");

        return `<option value="${index}">${escapeHtml(label)}</option>`;
      }).join("");

      const inner = `
        <div class="choice-select-wrap">
          <label class="choice-label" for="classChoiceSelect">수업 선택</label>
          <select class="choice-select" id="classChoiceSelect">${options}</select>
          <p class="choice-help">드롭바를 눌러 수업을 선택한 뒤 선택 버튼을 눌러주세요.</p>
        </div>
        <div class="modal-actions">
          <button class="modal-btn" onclick="confirmClassChoice()">선택</button>
          <button class="modal-btn gray" onclick="cancelChoiceModal()">취소</button>
        </div>
      `;

      showCustomModal(title, message, inner, "warning", "select-modal");
      focusSelectSoon("classChoiceSelect");
    }
    function confirmClassChoice() {
      const select = document.getElementById("classChoiceSelect");
      const index = select ? Number(select.value) : 0;
      const cls = (window.__classCandidates || [])[index];

      if (!cls) {
        showModal("수업 선택 오류", "수업 정보를 다시 선택해주세요.", "error");
        return;
      }

      selectClass(cls);
    }

    function selectClass(cls) {
      closeModal();
      submitCheck(lastMode, { attendanceNo: lastAttendanceNo, selectedClassIndex: cls.index });
    }

    function cancelChoiceModal() {
      selectedStudent = null;
      setBusy(false);
      closeModal();
      setStatus("출결번호를 입력해주세요.", "등원 또는 하원 버튼을 누르면 출결이 기록됩니다.", "success");
    }

    function focusSelectSoon(id) {
      setTimeout(() => {
        const el = document.getElementById(id);
        if (el) {
          try { el.focus({ preventScroll: true }); } catch (err) { el.focus(); }
        }
      }, 80);
    }

    function showModal(title, message = "", type = "success") {
      const actions = `<button class="modal-btn" onclick="closeModal()">확인</button>`;
      showCustomModal(title, message, `<div class="modal-actions">${actions}</div>`, type);

      // 정상/중복/오류 안내창은 일정 시간 뒤 자동 닫힘
      if (type !== "warning" || !document.querySelector(".choice-list")) {
        setTimeout(() => {
          const modal = document.getElementById("modalBackdrop");
          if (modal && modal.style.display === "flex") closeModal();
        }, type === "success" ? 1800 : 2400);
      }
    }

    function showCustomModal(title, message, innerHtml, type = "success", extraClass = "") {
      const backdrop = document.getElementById("modalBackdrop");
      const box = document.getElementById("modalBox");
      box.className = "modal";
      if (extraClass) box.classList.add(extraClass);
      if (type === "error") box.classList.add("error");
      if (type === "warning") box.classList.add("warning");

      document.getElementById("modalTitle").textContent = title || "안내";
      document.getElementById("modalMessage").textContent = message || "";
      document.getElementById("modalActions").innerHTML = innerHtml || `<button class="modal-btn" onclick="closeModal()">확인</button>`;
      backdrop.style.display = "flex";
    }

    function closeModal() {
      document.getElementById("modalBackdrop").style.display = "none";

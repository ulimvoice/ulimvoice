  <section class="left">

<script>
/****************************************************
 * 울림 태블릿 43차-2 전체본
 * - 기준: 38차 일일캐시/비동기 출결 구조
 * - 보강: 안전 호출, 학생용 문구, 관리자/운영용 화면 문구 숨김
 ****************************************************/
const API_URL = "https://script.google.com/macros/s/AKfycbx7wQFuw6MqqOijmvuwpeiCWOk3xU3hr41xoKbRltQHLb1kLbr_1RD5Zzy3iuWcrhUD0A/exec";
const TABLET_APP_VERSION = "2026.06.06.043.6";
const TABLET_DEBUG = false;

const URL_PARAMS = new URLSearchParams(location.search);
const KIOSK_KEY = URL_PARAMS.get("kioskKey") || localStorage.getItem("ULIM_TABLET_KIOSK_KEY") || "";

const DAILY_SNAPSHOT_KEY = "ULIM_TABLET_DAILY_SNAPSHOT_V43_2";
const DAILY_SNAPSHOT_AT_KEY = "ULIM_TABLET_DAILY_SNAPSHOT_AT_V43_2";
const DAILY_SNAPSHOT_DATE_KEY = "ULIM_TABLET_DAILY_SNAPSHOT_DATE_V43_2";
const STATUS_RESET_DELAY_MS = 5000;

let pin = "";
let busy = false;
let lastMode = "in";
let lastAttendanceNo = "";
let selectedStudent = null;
let adSlides = [];
let adIndex = 0;
let adTimer = null;
let tabletPreload = null;
let tabletPreloadAt = 0;
let tabletPreloadLoading = false;
let statusRequestSeq = 0;
let statusResetTimer = null;
let tabletProcessingFallbackTimer = null;

function pad2(n) {
  return String(n).padStart(2, "0");
}

function updateClock() {
  const now = new Date();
  const weekdays = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
  const ampm = now.getHours() >= 12 ? "오후" : "오전";
  const h12 = now.getHours() % 12 || 12;
  document.getElementById("clockDate").textContent = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 ${weekdays[now.getDay()]}`;
  document.getElementById("clockTime").textContent = `${ampm} ${pad2(h12)}:${pad2(now.getMinutes())}`;
}

function getTodayKey() {
  const now = new Date();
  return [now.getFullYear(), pad2(now.getMonth() + 1), pad2(now.getDate())].join("-");
}

function pressNum(num) {
  if (busy) return;
  if (pin.length >= 8) return;
  pin += num;
  renderPin();
}

function backspacePin() {
  if (busy) return;
  pin = pin.slice(0, -1);
  renderPin();
}

function clearPin() {
  pin = "";
  selectedStudent = null;
  renderPin();
}

function renderPin() {
  const el = document.getElementById("pinDisplay");
  if (!pin) {
    el.innerHTML = `<span class="pin-placeholder">출결번호</span>`;
  } else {
    el.textContent = pin;
  }
}

function setBusy(value) {
  busy = !!value;
  document.getElementById("checkInBtn").disabled = busy;
  document.getElementById("checkOutBtn").disabled = busy;
}

function apiUrl(params) {
  const q = new URLSearchParams(params || {});
  q.set("_", Date.now());
  if (KIOSK_KEY) q.set("kioskKey", KIOSK_KEY);
  return `${API_URL}?${q.toString()}`;
}

function tabletPublicMessage_(value, fallback) {
  const raw = String(value || "").trim();
  if (!raw) return fallback || "잠시 후 다시 시도해주세요.";

  if (/GAS|API|HTTP|JSON|HTML|서버|배포|웹앱|권한|대기열|출석부|알림톡|관리자|Script|Apps Script/i.test(raw)) {
    return fallback || "잠시 연결이 지연되고 있습니다. 다시 시도해주세요.";
  }

  return raw;
}

function tabletPublicErrorTitle_() {
  return "잠시 후 다시 시도해주세요.";
}

function tabletPublicErrorMessage_() {
  return "문제가 계속되면 데스크에 문의해주세요.";
}

async function tabletFetchJson(params, timeoutMs = 0) {
  // 43차-4 핵심 수정:
  // AbortController로 fetch를 강제 중단하지 않습니다.
  // Apps Script 첫 호출/캐시 생성은 15초 이상 걸릴 수 있는데,
  // 기존 43차-3은 이 요청을 끊어버려 AbortError가 발생했습니다.
  const startedAt = Date.now();
  const hardTimeoutMs = Math.max(0, Number(timeoutMs) || 0);

  const fetchPromise = fetch(apiUrl(params), {
    method: "GET",
    cache: "no-store"
  }).then(async function (res) {
    const text = await res.text();

    if (!res.ok) {
      if (TABLET_DEBUG) console.warn("[Tablet API] HTTP 오류:", res.status, text ? text.slice(0, 200) : "");
      throw new Error("잠시 연결이 지연되고 있습니다. 다시 시도해주세요.");
    }

    if (/^\s*</.test(text || "")) {
      if (TABLET_DEBUG) console.warn("[Tablet API] JSON 대신 HTML 응답:", text.slice(0, 200));
      throw new Error("잠시 연결이 지연되고 있습니다. 다시 시도해주세요.");
    }

    let data;
    try {
      data = JSON.parse(text);
    } catch (parseErr) {
      if (TABLET_DEBUG) console.warn("[Tablet API] JSON 파싱 실패:", text ? text.slice(0, 200) : "");
      throw new Error("잠시 연결이 지연되고 있습니다. 다시 시도해주세요.");
    }

    if (!data || typeof data !== "object") {
      if (TABLET_DEBUG) console.warn("[Tablet API] 응답 형식 오류:", data);
      throw new Error("잠시 연결이 지연되고 있습니다. 다시 시도해주세요.");
    }

    if (data.message) {
      data.message = tabletPublicMessage_(data.message, "잠시 연결이 지연되고 있습니다. 다시 시도해주세요.");
    }
    if (data.popupMessage) {
      data.popupMessage = tabletPublicMessage_(data.popupMessage, data.message || "잠시 연결이 지연되고 있습니다. 다시 시도해주세요.");
    }

    if (TABLET_DEBUG) {
      console.log("[Tablet API] 성공:", params && params.action, (Date.now() - startedAt) + "ms");
    }

    return data;
  });

  // timeoutMs가 0이면 끝까지 기다립니다. 주로 초기 캐시/광고/웜업에 사용합니다.
  if (!hardTimeoutMs) {
    return fetchPromise;
  }

  // timeout을 쓰더라도 AbortController로 실제 요청을 끊지 않습니다.
  // 화면은 복구하되, 서버 요청은 가능한 한 끝까지 진행되게 둡니다.
  const timeoutPromise = new Promise(function (_, reject) {
    setTimeout(function () {
      reject(new Error("잠시 연결이 지연되고 있습니다. 다시 시도해주세요."));
    }, hardTimeoutMs);
  });

  try {
    return await Promise.race([fetchPromise, timeoutPromise]);
  } catch (err) {
    if (TABLET_DEBUG) console.warn("[Tablet API] 호출 지연/실패:", params && params.action, err);
    throw new Error(tabletPublicMessage_(err && err.message, "잠시 연결이 지연되고 있습니다. 다시 시도해주세요."));
  }
}

function escapeHtml(value) {
  return String(value == null ? "" : value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, "&#096;");
}

function setStatus(title, message, type) {
  const card = document.getElementById("statusCard");
  const safeTitle = tabletPublicMessage_(title || "안내", "잠시 후 다시 시도해주세요.");
  const safeMessage = tabletPublicMessage_(message || "", "");

  card.className = "status-card" + (type === "error" ? " error" : type === "warning" ? " warning" : "");
  card.innerHTML = `
    <div>
      <h2>${escapeHtml(safeTitle)}</h2>
      ${safeMessage ? `<p>${escapeHtml(safeMessage)}</p>` : ""}
    </div>
  `;
}

function setDefaultStatus() {
  setStatus("출결번호를 입력해주세요.", "출결번호는 휴대폰 번호 뒤 네 자리", "success");
}

function resetStatusSoon(delay = STATUS_RESET_DELAY_MS) {
  if (statusResetTimer) clearTimeout(statusResetTimer);
  statusResetTimer = setTimeout(function () {
    setDefaultStatus();
  }, delay);
}

function clearProcessingFallback() {
  if (tabletProcessingFallbackTimer) {
    clearTimeout(tabletProcessingFallbackTimer);
    tabletProcessingFallbackTimer = null;
  }
}

function showInstantGreeting(mode) {
  const title = mode === "out" ? "안녕히 가세요!" : "어서오세요!";
  const message = mode === "out" ? "오늘도 수고 많았습니다." : "오늘도 즐거운 수업 되시길 바랍니다.";
  setStatus(title, message, "success");
  resetStatusSoon(2000);
}

function startProcessingFallback(seq, mode) {
  clearProcessingFallback();
  tabletProcessingFallbackTimer = setTimeout(function () {
    if (seq !== statusRequestSeq) return;
    showInstantGreeting(mode);
    // 네트워크가 늦어도 태블릿 버튼은 즉시 다시 사용할 수 있게 풉니다.
    setBusy(false);
    statusRequestSeq++;
  }, 3000);
}

function showModal(title, message, type, innerHtml, extraClass) {
  const backdrop = document.getElementById("modalBackdrop");
  const box = document.getElementById("modalBox");
  box.className = "modal" + (type === "error" ? " error" : type === "warning" ? " warning" : "") + (extraClass ? " " + extraClass : "");
  document.getElementById("modalTitle").textContent = tabletPublicMessage_(title || "안내", "안내");
  document.getElementById("modalMessage").textContent = tabletPublicMessage_(message || "", "");
  document.getElementById("modalActions").innerHTML = innerHtml || `<button class="modal-btn" onclick="closeModal()">확인</button>`;
  backdrop.style.display = "flex";
}

function closeModal() {
  document.getElementById("modalBackdrop").style.display = "none";
  document.getElementById("modalBox").className = "modal";
}

function closeModalByBackdrop(event) {
  if (event.target && event.target.id === "modalBackdrop") closeModal();
}

function normalizeAttendanceNoClient(value) {
  return String(value || "").replace(/[^0-9]/g, "");
}

function saveDailySnapshot(data) {
  if (!data || data.status !== "success" || !data.attendanceMap) return false;
  tabletPreload = data;
  tabletPreloadAt = Date.now();
  try {
    localStorage.setItem(DAILY_SNAPSHOT_KEY, JSON.stringify(data));
    localStorage.setItem(DAILY_SNAPSHOT_AT_KEY, String(tabletPreloadAt));
    localStorage.setItem(DAILY_SNAPSHOT_DATE_KEY, String(data.date || getTodayKey()));
  } catch (err) {
    if (TABLET_DEBUG) console.warn("[Tablet Cache] 저장 실패:", err);
  }
  return true;
}

function loadDailySnapshotFromLocal() {
  try {
    const dateKey = localStorage.getItem(DAILY_SNAPSHOT_DATE_KEY) || "";
    if (dateKey && dateKey !== getTodayKey()) return null;
    const raw = localStorage.getItem(DAILY_SNAPSHOT_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!data || data.status !== "success" || !data.attendanceMap) return null;
    tabletPreload = data;
    tabletPreloadAt = Number(localStorage.getItem(DAILY_SNAPSHOT_AT_KEY) || 0) || Date.now();
    return data;
  } catch (err) {
    return null;
  }
}

async function loadTabletPreload(force = false) {
  const now = Date.now();
  const localSnapshot = loadDailySnapshotFromLocal();

  if (!force && tabletPreload && now - tabletPreloadAt < 30 * 60 * 1000) return tabletPreload;
  if (!force && localSnapshot) {
    // 화면은 로컬 캐시로 즉시 살리고, 서버 캐시는 뒤에서 조용히 갱신합니다.
    refreshTabletDailySnapshotLocal(false, true);
    return localSnapshot;
  }
  if (tabletPreloadLoading) return tabletPreload || localSnapshot;

  tabletPreloadLoading = true;
  try {
    // 초기 캐시는 Abort/짧은 timeout 없이 기다립니다.
    // 이 함수는 시작 시 백그라운드로 호출되므로 화면을 막지 않습니다.
    const data = await tabletFetchJson({ action: "tabletGetDailySnapshot", force: force ? "1" : "0" }, 0);
    if (saveDailySnapshot(data)) return data;
  } catch (err) {
    if (TABLET_DEBUG) console.warn("[Tablet Cache] 일일자료 갱신 실패:", err);
  }

  try {
    const legacyData = await tabletFetchJson({ action: "tabletPreload" }, 0);
    if (saveDailySnapshot(legacyData)) return legacyData;
  } catch (err) {
    if (TABLET_DEBUG) console.warn("[Tablet Cache] 보조자료 갱신 실패:", err);
  } finally {
    tabletPreloadLoading = false;
  }

  return tabletPreload || localSnapshot;
}

async function refreshTabletDailySnapshotLocal(forceServer = true, silent = false) {
  try {
    const data = await tabletFetchJson({ action: "tabletGetDailySnapshot", force: forceServer ? "1" : "0" }, 0);
    saveDailySnapshot(data);
    return data;
  } catch (err) {
    if (!silent && TABLET_DEBUG) console.warn("[Tablet Cache] 새로고침 실패:", err);
    return loadDailySnapshotFromLocal();
  }
}

function getPreloadedCandidates(attendanceNo) {
  if (!tabletPreload || !tabletPreload.attendanceMap) return null;
  const key = normalizeAttendanceNoClient(attendanceNo);
  return tabletPreload.attendanceMap[key] || null;
}

async function tryHandleWithPreload(attendanceNo, mode, extra, seq) {
  if (!tabletPreload || !tabletPreload.attendanceMap) return false;
  if (extra && (extra.selectedClassIndex !== undefined || extra.classIndex !== undefined || extra.selectedRowNumber || extra.rowNumber)) return false;

  const candidates = getPreloadedCandidates(attendanceNo);
  if (!candidates || !candidates.length) return false;

  lastMode = mode;
  lastAttendanceNo = attendanceNo;

  if (candidates.length > 1) {
    clearProcessingFallback();
    setBusy(false);
    showStudentChoice({
      status: "multiple",
      attendanceNo: attendanceNo,
      candidates: candidates
    });
    return true;
  }

  const student = candidates[0];
  selectedStudent = student;
  const classes = Array.isArray(student.classes) ? student.classes : [];

  if (classes.length > 1) {
    clearProcessingFallback();
    setBusy(false);
    showClassChoice({
      status: "multipleClasses",
      attendanceNo: attendanceNo,
      studentName: student.name,
      studentRowNumber: student.rowNumber,
      classes: classes
    });
    return true;
  }

  const cls = classes.length === 1 ? classes[0] : {
    index: 0,
    className: student.className || "오늘 수업 확인 필요",
    instructor: student.instructor || "",
    roomName: "데스크문의"
  };

  await enqueueAttendanceFromLocalSnapshot(attendanceNo, mode, student, cls, seq);
  return true;
}

async function enqueueAttendanceFromLocalSnapshot(attendanceNo, mode, student, cls, seq) {
  const modeText = mode === "out" ? "하원" : "등원";
  const params = {
    action: "tabletEnqueueAttendance",
    attendanceNo: attendanceNo,
    mode: mode,
    selectedRowNumber: student.rowNumber || "",
    selectedStudentName: student.name || "",
    selectedClassIndex: cls.index !== undefined ? cls.index : "",
    className: cls.className || "",
    instructor: cls.instructor || student.instructor || "",
    roomName: cls.roomName || "데스크문의"
  };

  try {
    const data = await tabletFetchJson(params, 25000);
    if (seq !== statusRequestSeq) return;
    clearProcessingFallback();

    if (data && (data.duplicate === true || data.status === "duplicate" || data.status === "already")) {
      const message = tabletPublicMessage_(data.message || data.popupMessage || ("이미 " + modeText + "처리되었습니다."), "이미 " + modeText + "처리되었습니다.");
      setStatus(message, "", "warning");
      resetStatusSoon(5000);
      return;
    }

    if (data && data.status === "multiple") {
      showStudentChoice(data);
      return;
    }

    if (data && data.status === "multipleClasses") {
      showClassChoice(data);
      return;
    }

    if (!data || (data.status !== "queued" && data.status !== "success")) {
      return submitCheckLegacy(mode, params, seq);
    }

    const name = data.studentName || student.name || "학생";
    const className = data.className || cls.className || "데스크문의";
    const roomName = data.roomName || cls.roomName || "데스크문의";

    setStatus(
      mode === "out" ? `${name}님, 수고하셨습니다.` : `${name}님, 어서오세요.`,
      mode === "out" ? "오늘도 수고 많았습니다." : [`오늘 수업: ${className}`, `오늘 강의실: ${roomName}`].join("\n"),
      "success"
    );
    resetStatusSoon(5000);
  } catch (err) {
    if (seq === statusRequestSeq) {
      return submitCheckLegacy(mode, params, seq);
    }
  }
}

async function submitCheck(mode, extra = {}) {
  const attendanceNo = extra.attendanceNo || pin;
  if (!attendanceNo) {
    showModal("출결번호를 입력해주세요.", "", "warning");
    resetStatusSoon();
    return;
  }

  if (busy) return;
  setBusy(true);

  const seq = ++statusRequestSeq;
  lastMode = mode;
  lastAttendanceNo = attendanceNo;

  if (!extra || (!extra.selectedRowNumber && extra.selectedClassIndex === undefined && extra.classIndex === undefined)) {
    clearPin();
  }

  setStatus(mode === "out" ? "하원 처리 중입니다." : "등원 처리 중입니다.", "잠시만 기다려주세요.", "success");
  startProcessingFallback(seq, mode);

  try {
    const isDirectFirstTry = !extra || (!extra.selectedRowNumber && extra.selectedClassIndex === undefined && extra.classIndex === undefined);

    if (isDirectFirstTry) {
      // 이미 받은 캐시가 있을 때만 즉시 로컬 처리합니다.
      // 캐시가 아직 없으면 여기서 기다리지 않고 기존 API 처리로 바로 넘어갑니다.
      const localSnapshot = tabletPreload || loadDailySnapshotFromLocal();
      if (localSnapshot) {
        const handled = await tryHandleWithPreload(attendanceNo, mode, extra, seq);
        if (handled) return;
      } else {
        // 다음 학생부터 빨라지도록 백그라운드 캐시만 조용히 받아옵니다.
        loadTabletPreload(false);
      }
    }

    await submitCheckLegacy(mode, extra, seq);
  } finally {
    setBusy(false);
  }
}

async function submitCheckLegacy(mode, extra = {}, seqFromParent) {
  const seq = seqFromParent || statusRequestSeq;
  const attendanceNo = extra.attendanceNo || lastAttendanceNo || pin;
  const modeText = mode === "out" ? "하원" : "등원";

  if (!attendanceNo) {
    showModal("출결번호를 입력해주세요.", "", "warning");
    resetStatusSoon();
    return;
  }

  try {
    const params = {
      action: "tabletCheck",
      attendanceNo: attendanceNo,
      mode: mode
    };

    if (selectedStudent && selectedStudent.rowNumber) {
      params.selectedRowNumber = selectedStudent.rowNumber;
      params.selectedStudentName = selectedStudent.name || "";
    }

    Object.keys(extra || {}).forEach(function (key) {
      if (key === "action") return;
      if (extra[key] !== undefined && extra[key] !== null) params[key] = extra[key];
    });

    const data = await tabletFetchJson(params, 25000);
    if (seq !== statusRequestSeq) return;
    clearProcessingFallback();

    if (data && (data.duplicate === true || data.status === "duplicate" || data.status === "already")) {
      const message = tabletPublicMessage_(data.message || data.popupMessage || ("이미 " + modeText + "처리되었습니다."), "이미 " + modeText + "처리되었습니다.");
      setStatus(message, "", "warning");
      resetStatusSoon(5000);
      return;
    }

    if (data && data.status === "multiple") {
      showStudentChoice(data);
      return;
    }

    if (data && data.status === "multipleClasses") {
      showClassChoice(data);
      return;
    }

    if (!data || data.status !== "success") {
      const msg = tabletPublicMessage_(data && data.message, tabletPublicErrorMessage_());
      setStatus(tabletPublicErrorTitle_(), msg, "warning");
      resetStatusSoon(3000);
      return;
    }

    const name = data.studentName || "학생";
    const className = data.className || "데스크문의";
    const roomName = data.roomName || "데스크문의";

    setStatus(
      mode === "out" ? `${name}님, 수고하셨습니다.` : `${name}님, 어서오세요.`,
      mode === "out" ? "오늘도 수고 많았습니다." : [`오늘 수업: ${className}`, `오늘 강의실: ${roomName}`].join("\n"),
      "success"
    );
    resetStatusSoon(5000);
  } catch (err) {
    if (seq !== statusRequestSeq) return;
    clearProcessingFallback();
    setStatus(tabletPublicErrorTitle_(), tabletPublicMessage_(err && err.message, tabletPublicErrorMessage_()), "warning");
    resetStatusSoon(3000);
  }
}

function showStudentChoice(data) {
  const candidates = Array.isArray(data.candidates) ? data.candidates : [];
  if (!candidates.length) {
    showModal("학생을 찾지 못했습니다.", "데스크에 문의해주세요.", "warning");
    return;
  }

  const buttons = candidates.map(function (student) {
    const rowNumber = escapeAttr(student.rowNumber || student.studentRowNumber || "");
    const name = escapeAttr(student.name || student.studentName || "학생");
    return `<button class="choice-btn" onclick="selectStudentChoice('${rowNumber}', '${name}')"><b>${escapeHtml(student.name || student.studentName || "학생")}</b></button>`;
  }).join("");

  showModal(
    "학생을 선택해주세요.",
    "같은 출결번호를 사용하는 학생이 있습니다.",
    "success",
    `<div class="choice-list">${buttons}</div><div class="modal-actions"><button class="modal-btn gray" onclick="closeModal(); setDefaultStatus();">취소</button></div>`
  );
}

function selectStudentChoice(rowNumber, name) {
  closeModal();
  selectedStudent = { rowNumber: rowNumber, name: name };
  submitCheck(lastMode, {
    attendanceNo: lastAttendanceNo,
    selectedRowNumber: rowNumber,
    selectedStudentName: name
  });
}

function showClassChoice(data) {
  const classes = Array.isArray(data.classes) ? data.classes : [];
  if (!classes.length) {
    showModal("수업을 찾지 못했습니다.", "데스크에 문의해주세요.", "warning");
    return;
  }

  const attendanceNo = escapeAttr(data.attendanceNo || lastAttendanceNo || "");
  const studentName = escapeAttr(data.studentName || "학생");
  const studentRowNumber = escapeAttr(data.studentRowNumber || data.rowNumber || "");

  const buttons = classes.map(function (cls, idx) {
    const classIndex = cls.index !== undefined ? cls.index : idx;
    const className = cls.className || "오늘 수업 확인 필요";
    const roomName = cls.roomName || "데스크문의";
    const instructor = cls.instructor || "";
    return `<button class="choice-btn" onclick="selectClassChoice('${attendanceNo}', '${studentRowNumber}', '${studentName}', '${escapeAttr(classIndex)}', '${escapeAttr(className)}', '${escapeAttr(instructor)}', '${escapeAttr(roomName)}')"><b>${escapeHtml(className)}</b><br>강의실: ${escapeHtml(roomName)}</button>`;
  }).join("");

  showModal(
    "수업을 선택해주세요.",
    `${data.studentName || "학생"}님의 오늘 수업이 여러 개 있습니다.`,
    "success",
    `<div class="choice-list">${buttons}</div><div class="modal-actions"><button class="modal-btn gray" onclick="closeModal(); setDefaultStatus();">취소</button></div>`,
    "select-modal"
  );
}

function selectClassChoice(attendanceNo, studentRowNumber, studentName, classIndex, className, instructor, roomName) {
  closeModal();
  submitCheck(lastMode, {
    attendanceNo: attendanceNo || lastAttendanceNo,
    selectedRowNumber: studentRowNumber || "",
    selectedStudentName: studentName || "",
    selectedClassIndex: classIndex,
    className: className || "",
    instructor: instructor || "",
    roomName: roomName || "데스크문의"
  });
}

async function warmup() {
  try {
    await tabletFetchJson({ action: "tabletWarmup" }, 0);
  } catch (err) {}
}

async function loadAds() {
  try {
    const data = await tabletFetchJson({ action: "tabletGetAds" }, 0);
    adSlides = data.slides && data.slides.length ? data.slides : defaultSlides();
  } catch (err) {
    adSlides = defaultSlides();
  }
  adIndex = 0;
  renderAdSlide();
}

function defaultSlides() {
  return [
    {
      type: "공지",
      title: "홍보 영상",
      content: "울림연기학원에 오신 것을 환영합니다.",
      imageUrl: "",
      videoUrl: "",
      seconds: 8
    }
  ];
}

function extractYoutubeId(url) {
  const text = String(url || "");
  const m = text.match(/embed\/([^?&/]+)/) || text.match(/[?&]v=([^?&]+)/) || text.match(/youtu\.be\/([^?&/]+)/);
  return m ? m[1] : "";
}

function buildYoutubeEmbedUrl(url) {
  const safeUrl = String(url || "");
  const id = extractYoutubeId(safeUrl);
  const sep = safeUrl.indexOf("?") === -1 ? "?" : "&";
  return safeUrl + sep + "autoplay=1&mute=1&loop=1" + (id ? "&playlist=" + encodeURIComponent(id) : "");
}

function renderAdSlide() {
  if (!adSlides.length) adSlides = defaultSlides();

  const slide = adSlides[adIndex] || adSlides[0];
  document.getElementById("adTitle").textContent = slide.title || "홍보 영상";
  document.getElementById("slideCount").textContent = `${adIndex + 1} / ${adSlides.length}`;

  const box = document.getElementById("adBox");
  const videoUrl = slide.videoUrl || "";
  const imageUrl = slide.imageUrl || "";

  if (videoUrl) {
    if (videoUrl.includes("youtube.com/embed/")) {
      box.innerHTML = `<iframe src="${escapeAttr(buildYoutubeEmbedUrl(videoUrl))}" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
    } else {
      box.innerHTML = `<video src="${escapeAttr(videoUrl)}" autoplay muted loop playsinline></video>`;
    }
  } else if (imageUrl) {
    box.innerHTML = `<img src="${escapeAttr(imageUrl)}" alt="홍보 이미지" onerror="this.parentElement.innerHTML=\`<div class='ad-text'>이미지를 불러오지 못했습니다.</div>\`;">`;
  } else {
    box.innerHTML = `<div class="ad-text">${escapeHtml(slide.content || "오늘도 좋은 수업 되세요.")}</div>`;
  }

  clearTimeout(adTimer);
  const seconds = Math.max(5, Number(slide.seconds || 10));
  adTimer = setTimeout(function () {
    nextAdSlide(false);
  }, seconds * 1000);
}

function nextAdSlide(manual = true) {
  if (!adSlides.length) return;
  clearTimeout(adTimer);
  adIndex = (adIndex + 1) % adSlides.length;
  renderAdSlide();
}

function prevAdSlide(manual = true) {
  if (!adSlides.length) return;
  clearTimeout(adTimer);
  adIndex = (adIndex - 1 + adSlides.length) % adSlides.length;
  renderAdSlide();
}

function handleAdAreaClick(event) {
  const tag = String((event.target && event.target.tagName) || "").toLowerCase();
  if (["button", "iframe", "video"].indexOf(tag) !== -1) return;
  nextAdSlide(true);
}

window.addEventListener("keydown", function (event) {
  if (/^[0-9]$/.test(event.key)) {
    pressNum(event.key);
    return;
  }
  if (event.key === "Backspace") {
    backspacePin();
    return;
  }
  if (event.key === "Enter") {
    submitCheck("in");
  }
});

/****************************************************
 * 43차-6 반응속도/문구 타이밍 재정리
 * - 서버 응답 전 3초 뒤 성공 문구를 미리 띄우던 로직 제거
 * - 로컬 일일캐시가 있으면 학생/수업/강의실을 즉시 표시하고 기록은 백그라운드 대기열로 전송
 * - 로컬 일일캐시가 없을 때만 짧은 확인 문구를 표시한 뒤 기존 API로 처리
 ****************************************************/
function hasClassSelectionExtra_43_6(extra) {
  return !!(extra && (
    extra.selectedClassIndex !== undefined ||
    extra.classIndex !== undefined ||
    extra.selectedRowNumber ||
    extra.rowNumber
  ));
}

function buildAttendanceParams_43_6(attendanceNo, mode, student, cls, extra) {
  const params = {
    action: "tabletEnqueueAttendance",
    attendanceNo: attendanceNo,
    mode: mode,
    selectedRowNumber: (student && (student.rowNumber || student.studentRowNumber)) || (extra && (extra.selectedRowNumber || extra.rowNumber)) || "",
    selectedStudentName: (student && (student.name || student.studentName)) || (extra && extra.selectedStudentName) || "",
    selectedClassIndex: (cls && cls.index !== undefined ? cls.index : ""),
    className: (cls && cls.className) || (extra && extra.className) || "",
    instructor: (cls && cls.instructor) || (student && student.instructor) || (extra && extra.instructor) || "",
    roomName: (cls && cls.roomName) || (extra && extra.roomName) || "데스크문의"
  };

  Object.keys(extra || {}).forEach(function (key) {
    if (key === "action") return;
    if (params[key] === undefined || params[key] === "") {
      if (extra[key] !== undefined && extra[key] !== null) params[key] = extra[key];
    }
  });

  return params;
}

function showAttendanceSuccess_43_6(mode, name, className, roomName) {
  const safeName = name || "학생";
  if (mode === "out") {
    setStatus(`${safeName}님, 수고하셨습니다.`, "오늘도 수고 많았습니다.", "success");
  } else {
    setStatus(
      `${safeName}님, 어서오세요.`,
      [`오늘 수업: ${className || "데스크문의"}`, `오늘 강의실: ${roomName || "데스크문의"}`].join("\n"),
      "success"
    );
  }
  resetStatusSoon(3500);
}

function showNeutralWaiting_43_6(seq) {
  clearProcessingFallback();
  tabletProcessingFallbackTimer = setTimeout(function () {
    if (seq !== statusRequestSeq) return;
    setStatus("확인 중입니다.", "잠시만 기다려주세요.", "success");
  }, 1200);
}

// 기존 3초 후 가짜 성공 문구를 띄우던 fallback은 더 이상 사용하지 않습니다.
function startProcessingFallback(seq, mode) {
  showNeutralWaiting_43_6(seq);
}

function enqueueAttendanceBackground_43_6(attendanceNo, mode, student, cls, extra, seq) {
  const modeText = mode === "out" ? "하원" : "등원";
  const params = buildAttendanceParams_43_6(attendanceNo, mode, student, cls, extra || {});

  tabletFetchJson(params, 0).then(function (data) {
    if (seq !== statusRequestSeq) return;
    clearProcessingFallback();

    if (data && (data.duplicate === true || data.status === "duplicate" || data.status === "already")) {
      const message = tabletPublicMessage_(data.message || data.popupMessage || ("이미 " + modeText + "처리되었습니다."), "이미 " + modeText + "처리되었습니다.");
      setStatus(message, "", "warning");
      resetStatusSoon(4000);
      return;
    }

    if (data && (data.status === "queued" || data.status === "success")) {
      // 빠른 화면 안내가 이미 나갔으므로 성공 응답은 화면을 다시 흔들지 않습니다.
      return;
    }

    if (!data || (data.status !== "queued" && data.status !== "success")) {
      submitCheckLegacy(mode, params, seq);
    }
  }).catch(function (err) {
    if (seq !== statusRequestSeq) return;
    clearProcessingFallback();
    setStatus("처리가 지연되고 있습니다.", "데스크에 문의해주세요.", "warning");
    resetStatusSoon(4000);
  });
}

async function tryHandleWithPreload(attendanceNo, mode, extra, seq) {
  if (!tabletPreload || !tabletPreload.attendanceMap) return false;
  if (hasClassSelectionExtra_43_6(extra)) return false;

  const candidates = getPreloadedCandidates(attendanceNo);
  if (!candidates || !candidates.length) return false;

  lastMode = mode;
  lastAttendanceNo = attendanceNo;

  if (candidates.length > 1) {
    clearProcessingFallback();
    setBusy(false);
    showStudentChoice({
      status: "multiple",
      attendanceNo: attendanceNo,
      candidates: candidates
    });
    return true;
  }

  const student = candidates[0];
  selectedStudent = student;
  const classes = Array.isArray(student.classes) ? student.classes : [];

  if (classes.length > 1) {
    clearProcessingFallback();
    setBusy(false);
    showClassChoice({
      status: "multipleClasses",
      attendanceNo: attendanceNo,
      studentName: student.name,
      studentRowNumber: student.rowNumber,
      classes: classes
    });
    return true;
  }

  const cls = classes.length === 1 ? classes[0] : {
    index: 0,
    className: student.className || "오늘 수업 확인 필요",
    instructor: student.instructor || "",
    roomName: "데스크문의"
  };

  clearProcessingFallback();
  showAttendanceSuccess_43_6(mode, student.name || student.studentName || "학생", cls.className, cls.roomName);
  setBusy(false);
  enqueueAttendanceBackground_43_6(attendanceNo, mode, student, cls, {}, seq);
  return true;
}

async function enqueueAttendanceFromLocalSnapshot(attendanceNo, mode, student, cls, seq) {
  clearProcessingFallback();
  showAttendanceSuccess_43_6(mode, student && (student.name || student.studentName) || "학생", cls && cls.className, cls && cls.roomName);
  setBusy(false);
  enqueueAttendanceBackground_43_6(attendanceNo, mode, student, cls, {}, seq);
}

async function submitCheck(mode, extra = {}) {
  const attendanceNo = extra.attendanceNo || pin;
  if (!attendanceNo) {
    showModal("출결번호를 입력해주세요.", "", "warning");
    resetStatusSoon();
    return;
  }

  if (busy) return;
  setBusy(true);

  const seq = ++statusRequestSeq;
  lastMode = mode;
  lastAttendanceNo = attendanceNo;

  const isChoiceSubmit = hasClassSelectionExtra_43_6(extra);
  if (!isChoiceSubmit) {
    clearPin();
  }

  try {
    // 반 선택 이후에는 이미 학생명/수업/강의실을 알고 있으므로 즉시 안내하고 기록만 뒤에서 보냅니다.
    if (extra && (extra.selectedClassIndex !== undefined || extra.classIndex !== undefined) && (extra.className || extra.roomName)) {
      const studentForChoice = {
        rowNumber: extra.selectedRowNumber || extra.rowNumber || "",
        name: extra.selectedStudentName || (selectedStudent && selectedStudent.name) || "학생",
        instructor: extra.instructor || ""
      };
      const classForChoice = {
        index: extra.selectedClassIndex !== undefined ? extra.selectedClassIndex : extra.classIndex,
        className: extra.className || "데스크문의",
        instructor: extra.instructor || "",
        roomName: extra.roomName || "데스크문의"
      };
      clearProcessingFallback();
      showAttendanceSuccess_43_6(mode, studentForChoice.name, classForChoice.className, classForChoice.roomName);
      setBusy(false);
      enqueueAttendanceBackground_43_6(attendanceNo, mode, studentForChoice, classForChoice, extra, seq);
      return;
    }

    // 로컬 일일캐시가 있으면 화면은 즉시 처리합니다.
    const localSnapshot = tabletPreload || loadDailySnapshotFromLocal();
    if (localSnapshot) {
      const handled = await tryHandleWithPreload(attendanceNo, mode, extra, seq);
      if (handled) return;
    } else {
      // 다음 학생부터 빨라지도록 백그라운드 캐시만 조용히 받아옵니다.
      loadTabletPreload(false);
    }

    // 캐시에 없거나 선택 정보가 부족한 경우에만 서버 확인 문구를 표시합니다.
    setStatus("확인 중입니다.", "잠시만 기다려주세요.", "success");
    showNeutralWaiting_43_6(seq);
    await submitCheckLegacy(mode, extra, seq);
  } finally {
    setBusy(false);
  }
}

</script>

<script>
/****************************************************
 * 태블릿 PWA 설치 안내
 ****************************************************/
const PWA_HIDE_KEY = "ULIM_TABLET_PWA_INSTALL_HIDE";
let deferredPrompt = null;

window.addEventListener("beforeinstallprompt", function (e) {
  if (localStorage.getItem(PWA_HIDE_KEY) === "Y") return;
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(function () {
    showPwaInstallGuide();
  }, 1800);
});

function showPwaInstallGuide() {
  if (!deferredPrompt) return;
  showModal(
    "앱으로 설치하기",
    "울림연기학원 앱을 홈 화면에 설치하면 더 편하게 사용할 수 있습니다.",
    "success",
    `
      <div class="modal-actions">
        <button class="modal-btn" onclick="installPwa()">앱 설치하기</button>
        <button class="modal-btn gray" onclick="closeModal()">나중에</button>
        <button class="modal-btn gray" onclick="hidePwaForever()">다시는 보지 않기</button>
      </div>
    `
  );
}

async function installPwa() {
  if (!deferredPrompt) {
    closeModal();
    return;
  }
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  closeModal();
}

function hidePwaForever() {
  localStorage.setItem(PWA_HIDE_KEY, "Y");
  closeModal();
}
</script>

<script>
/****************************************************
 * 태블릿 PWA 업데이트 확인
 ****************************************************/
const TABLET_VERSION_CHECK_KEY = "ULIM_TABLET_VERSION_CHECK_DATE";
const TABLET_VERSION_SKIP_KEY = "ULIM_TABLET_VERSION_SKIP_DATE";
const TABLET_SAVED_VERSION_KEY = "ULIM_TABLET_APP_VERSION";
const TABLET_UPDATE_QUERY_KEY = "tabletUpdate";

function getTabletBaseUrl() {
  return location.origin + location.pathname;
}

async function checkTabletAppUpdateOncePerDay() {
  try {
    const today = getTodayKey();
    if (localStorage.getItem(TABLET_VERSION_CHECK_KEY) === today) return;
    localStorage.setItem(TABLET_VERSION_CHECK_KEY, today);

    const remoteUrl = getTabletBaseUrl() + "?_versionCheck=" + Date.now();
    const response = await fetch(remoteUrl, { method: "GET", cache: "no-store" });
    if (!response.ok) return;

    const html = await response.text();
    const match = html.match(/const\s+TABLET_APP_VERSION\s*=\s*["']([^"']+)["']/);
    const remoteVersion = match ? String(match[1]).trim() : "";
    if (!remoteVersion) return;

    const savedVersion = localStorage.getItem(TABLET_SAVED_VERSION_KEY) || TABLET_APP_VERSION;
    localStorage.setItem(TABLET_SAVED_VERSION_KEY, savedVersion);

    if (remoteVersion !== TABLET_APP_VERSION && remoteVersion !== savedVersion) {
      showTabletUpdateModal(remoteVersion);
    }
  } catch (err) {
    console.log("[Tablet Update] 업데이트 확인 실패:", err);
  }
}

function showTabletUpdateModal(remoteVersion) {
  showModal(
    "업데이트 안내",
    "태블릿 앱 새 버전이 있습니다.\n지금 업데이트하시겠습니까?",
    "success",
    `
      <div class="modal-actions">
        <button class="modal-btn" onclick="applyTabletAppUpdate('${escapeAttr(remoteVersion)}')">업데이트</button>
        <button class="modal-btn gray" onclick="skipTabletAppUpdateToday('${escapeAttr(remoteVersion)}')">나중에</button>
      </div>
    `
  );
}

function skipTabletAppUpdateToday(remoteVersion) {
  localStorage.setItem(TABLET_VERSION_SKIP_KEY, getTodayKey());
  closeModal();
}

async function applyTabletAppUpdate(remoteVersion) {
  try {
    closeModal();
    localStorage.setItem(TABLET_SAVED_VERSION_KEY, remoteVersion || TABLET_APP_VERSION);
    if ("serviceWorker" in navigator) {
      const registrations = await navigator.serviceWorker.getRegistrations();
      await Promise.all(registrations.map(function (reg) {
        try { return reg.update(); } catch (e) { return Promise.resolve(); }
      }));
    }
  } catch (err) {
    console.log("[Tablet Update] Service Worker 업데이트 확인 실패:", err);
  } finally {
    const updateUrl = getTabletBaseUrl() +
      "?v=" + encodeURIComponent(remoteVersion || TABLET_APP_VERSION) +
      "&" + TABLET_UPDATE_QUERY_KEY + "=" + Date.now();
    location.replace(updateUrl);
  }
}
</script>

document.addEventListener("DOMContentLoaded", function () {
